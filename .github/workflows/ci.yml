name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: python -W error::ResourceWarning -m unittest discover -s tests -v
      - name: Smoke test the CLI against a fixture
        run: |
          mkdir -p ci-fixture/.claude/skills/sample
          printf -- '---\nname: sample\ndescription: A sample skill used to smoke-test the CLI.\n---\nBody.\n' \
            > ci-fixture/.claude/skills/sample/SKILL.md
          python skillscope.py --project ci-fixture --out /tmp/report.html
          test -s /tmp/report.html
